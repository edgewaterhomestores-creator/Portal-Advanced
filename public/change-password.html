<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Change Staff Password</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="shell login-shell">
      <header class="topbar login-topbar">
        <div>
          <p class="eyebrow">Contract Portal</p>
          <h1>Change Password</h1>
        </div>
      </header>

      <section class="panel login-card">
        <div class="section-head login-head">
          <div>
            <h2>Set your staff password</h2>
            <p>Temporary passwords must be changed before using the staff portal.</p>
          </div>
        </div>

        <form id="change-password-form" class="login-form-stack">
          <label>Current password<input name="currentPassword" type="password" autocomplete="current-password" required /></label>
          <label>New password<input name="newPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
          <label>Confirm new password<input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
          <button class="primary full-width-button" type="submit">Save password</button>
        </form>
        <p id="change-password-error" class="error"></p>
      </section>
    </main>

    <script src="/js/http.js"></script>
    <script src="/js/small-screen.js"></script>
    <script src="/js/portal-nav.js"></script>
    <script src="/js/password-toggle.js"></script>
    <script src="/js/change-password.js"></script>
  </body>
</html>
