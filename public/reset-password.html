<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="shell login-shell">
      <header class="topbar login-topbar">
        <div>
          <p class="eyebrow">Contract Portal</p>
          <h1>Reset Password</h1>
        </div>
      </header>

      <section class="panel login-card">
        <div class="section-head login-head">
          <h2>Set new password</h2>
        </div>

        <form id="reset-password-form" class="login-form-stack">
          <label>New password<input name="newPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
          <label>Confirm new password<input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
          <button class="primary full-width-button" type="submit">Save password</button>
        </form>
        <p id="reset-password-status" class="error"></p>
      </section>
    </main>

    <script src="/js/http.js"></script>
    <script src="/js/small-screen.js"></script>
    <script src="/js/portal-nav.js?v=20260610-session-keepalive"></script>
    <script src="/js/password-toggle.js?v=20260608-password-toggle"></script>
    <script src="/js/reset-password.js?v=20260606-1259"></script>
  </body>
</html>
