<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contract Portal Login</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="shell login-shell">
      <header class="topbar login-topbar">
        <div>
          <p class="eyebrow">Contract Portal</p>
          <h1>Store Admin Login</h1>
          <p id="login-destination" class="login-destination hidden"></p>
        </div>
      </header>

      <section class="panel login-card">
        <div class="section-head login-head">
          <h2>Login</h2>
        </div>

        <form id="login-form" class="login-form-stack" autocomplete="off">
          <label>Username / Email<input name="staffLoginName" autocomplete="off" autocapitalize="none" spellcheck="false" data-clear-on-load required /></label>
          <label>Password<input class="masked-entry-secret" name="staffLoginSecret" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" data-clear-on-load data-secret-toggle required /></label>
          <button class="primary full-width-button" type="submit">Log in</button>
          <button class="ghost full-width-button" type="button" id="staff-forgot-password">Forgot Password</button>
        </form>
        <form id="staff-reset-form" class="login-form-stack hidden" autocomplete="off">
          <label>Email<input name="resetEmail" type="email" autocomplete="off" autocapitalize="none" spellcheck="false" /></label>
          <button class="primary full-width-button" type="submit">Send Reset Link</button>
          <button class="ghost full-width-button" type="button" id="staff-reset-cancel">Cancel</button>
        </form>
        <p id="login-error" class="error"></p>
      </section>
    </main>

    <script src="/js/http.js"></script>
    <script src="/js/small-screen.js"></script>
    <script src="/js/portal-nav.js"></script>
    <script src="/js/password-toggle.js"></script>
    <script src="/js/login.js?v=20260606-1259"></script>
  </body>
</html>
