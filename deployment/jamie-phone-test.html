<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hi Jamie</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f8fb;
        color: #143447;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 120, 212, 0.16), transparent 32%),
          linear-gradient(135deg, #f5f8fb 0%, #eef6fb 48%, #f9fbfd 100%);
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: clamp(28px, 7vw, 56px);
        border: 1px solid rgba(0, 120, 212, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 50px rgba(20, 52, 71, 0.16);
        text-align: center;
      }

      .logo {
        display: block;
        width: min(250px, 68vw);
        max-height: 130px;
        object-fit: contain;
        margin: 0 auto 26px;
        opacity: 0;
        transform: translateY(-24px) scale(0.86);
        animation: logoIn 900ms cubic-bezier(0.2, 0.9, 0.25, 1.1) forwards;
      }

      .logo.is-hidden {
        display: none;
      }

      .hello-wrap {
        opacity: 0;
        transform: rotate(-7deg) scale(0.88);
        animation: hello 900ms 360ms cubic-bezier(0.2, 0.9, 0.25, 1.15) forwards;
      }

      .label {
        margin: 0 0 14px;
        color: #0078d4;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #0078d4;
        font-size: clamp(52px, 16vw, 112px);
        line-height: 0.95;
      }

      p {
        max-width: 560px;
        margin: 22px auto 0;
        font-size: clamp(18px, 4.4vw, 24px);
        line-height: 1.42;
      }

      .ok {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        margin-top: 26px;
        padding: 0 16px;
        border-radius: 999px;
        background: #dff0ff;
        color: #075d9d;
        font-weight: 700;
      }

      .small {
        margin-top: 18px;
        color: #5f7180;
        font-size: 14px;
      }

      @keyframes logoIn {
        0% {
          opacity: 0;
          transform: translateY(-26px) scale(0.84);
          filter: blur(4px);
        }

        65% {
          opacity: 1;
          transform: translateY(4px) scale(1.04);
          filter: blur(0);
        }

        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes hello {
        0% {
          opacity: 0;
          transform: rotate(-7deg) scale(0.88);
        }

        70% {
          opacity: 1;
          transform: rotate(1deg) scale(1.03);
        }

        100% {
          opacity: 1;
          transform: rotate(0deg) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" id="testLogo" src="/jamie-test-logo.png" alt="Edgewater Cabinet Store">
      <div class="hello-wrap">
        <p class="label">Edgewater Contract Portal Test</p>
        <h1>Hi, Jamie</h1>
      </div>
      <p>If you can see this from your phone, the outside web request reached the Pueblo server.</p>
      <div class="ok">Phone test page loaded</div>
      <p class="small">This is only a connection test, not the live customer signing portal yet.</p>
    </main>
    <script>
      const logo = document.getElementById('testLogo');

      logo.addEventListener('error', () => {
        logo.classList.add('is-hidden');
      });
    </script>
  </body>
</html>
